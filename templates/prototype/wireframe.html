<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{FEATURE_NAME}} - 线框原型</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 600;
            margin: 0;
            color: #111;
        }

        .header p {
            color: #666;
            margin: 10px 0 0 0 0;
        }

        .nav {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: #fafafa;
            border-radius: 8px;
        }

        .nav-item {
            padding: 8px 16px;
            border: 1px dashed #ddd;
            border-radius: 4px;
            cursor: pointer;
        }

        .nav-item:hover {
            border-color: #666;
            background: #f0f0f0;
        }

        .section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e5e7eb;
            color: #111;
        }

        .wireframe-box {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 20px;
            background: #fafafa;
            margin-bottom: 20px;
        }

        .wireframe-header {
            height: 24px;
            background: #ddd;
            border-radius: 4px 4px 0 0;
            margin-bottom: 12px;
        }

        .wireframe-body {
            min-height: 60px;
            background: #f0f0f0;
            border-radius: 4px;
            margin-bottom: 12px;
        }

        .wireframe-footer {
            height: 40px;
            background: #f0f0f0;
            border-radius: 4px 0 0 4px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .button {
            padding: 10px 20px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: white;
            cursor: pointer;
        }

        .button-primary {
            background: #4a90e2;
            color: white;
            border: none;
        }

        .button-secondary {
            background: #fff;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{{FEATURE_NAME}}</h1>
            <p>{{FEATURE_DESCRIPTION}}</p>
        </div>

        <div class="nav">
            <div class="nav-item">页面 1</div>
            <div class="nav-item">页面 2</div>
            <div class="nav-item">页面 3</div>
        </div>

        <div class="section">
            <h2 class="section-title">页面标题</h2>

            <div class="wireframe-box">
                <div class="wireframe-header"></div>
                <div class="wireframe-body">
                    内容区域
                </div>
                <div class="wireframe-footer"></div>
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">操作区域</h2>

            <div class="button-group">
                <button class="button button-primary">主要操作</button>
                <button class="button button-secondary">次要操作</button>
            </div>
        </div>
    </div>
</body>
</html>
