<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{FEATURE_NAME}} - 线框原型</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#667eea',
                        secondary: '#764ba2',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen p-6">
    <div class="max-w-6xl mx-auto">
        <!-- 页面头部 -->
        <header class="border-b-2 border-gray-200 pb-5 mb-8">
            <h1 class="text-3xl font-semibold text-gray-900">{{FEATURE_NAME}}</h1>
            <p class="text-gray-500 mt-2">{{FEATURE_DESCRIPTION}}</p>
        </header>

        <!-- 导航栏 -->
        <nav class="flex gap-3 mb-8 p-4 bg-gray-100 rounded-lg">
            <div class="px-4 py-2 border-2 border-dashed border-gray-300 rounded cursor-pointer hover:border-gray-400 hover:bg-gray-200 transition">首页</div>
            <div class="px-4 py-2 border-2 border-dashed border-gray-300 rounded cursor-pointer hover:border-gray-400 hover:bg-gray-200 transition">功能</div>
            <div class="px-4 py-2 border-2 border-dashed border-gray-300 rounded cursor-pointer hover:border-gray-400 hover:bg-gray-200 transition">设置</div>
        </nav>

        <!-- 主要内容区 -->
        <main class="space-y-8">
            <!-- 区块示例 -->
            <section class="border-2 border-dashed border-gray-300 rounded-lg p-6 bg-gray-100">
                <h2 class="text-xl font-semibold text-gray-900 mb-4 pb-2 border-b-2 border-gray-200">内容区块</h2>
                <div class="space-y-4">
                    <div class="h-6 bg-gray-300 rounded"></div>
                    <div class="h-16 bg-gray-200 rounded"></div>
                    <div class="h-10 bg-gray-200 rounded"></div>
                </div>
            </section>

            <!-- 按钮组示例 -->
            <section class="border-2 border-dashed border-gray-300 rounded-lg p-6 bg-gray-100">
                <h2 class="text-xl font-semibold text-gray-900 mb-4 pb-2 border-b-2 border-gray-200">操作区域</h2>
                <div class="flex gap-3">
                    <button class="px-5 py-2.5 bg-blue-500 text-white rounded-lg cursor-pointer hover:bg-blue-600 transition">主要操作</button>
                    <button class="px-5 py-2.5 bg-white text-gray-700 border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50 transition">次要操作</button>
                </div>
            </section>

            <!-- 卡片列表示例 -->
            <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 bg-white">
                    <div class="h-4 bg-gray-300 rounded w-3/4 mb-3"></div>
                    <div class="h-3 bg-gray-200 rounded w-full mb-2"></div>
                    <div class="h-3 bg-gray-200 rounded w-5/6"></div>
                </div>
                <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 bg-white">
                    <div class="h-4 bg-gray-300 rounded w-3/4 mb-3"></div>
                    <div class="h-3 bg-gray-200 rounded w-full mb-2"></div>
                    <div class="h-3 bg-gray-200 rounded w-5/6"></div>
                </div>
                <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 bg-white">
                    <div class="h-4 bg-gray-300 rounded w-3/4 mb-3"></div>
                    <div class="h-3 bg-gray-200 rounded w-full mb-2"></div>
                    <div class="h-3 bg-gray-200 rounded w-5/6"></div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
