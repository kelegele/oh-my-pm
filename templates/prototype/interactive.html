<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{FEATURE_NAME}} - 交互原型</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f3f4f6;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .sidebar {
            width: 240px;
            background: #1f2937;
            padding: 24px;
            border-radius: 12px 0 0;
            color: white;
        }

        .sidebar h2 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #1f2937;
        }

        .nav-item {
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
            color: #6b7280;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-item.active {
            background: #667eea;
            color: white;
        }

        .main {
            flex: 1;
            background: #fafafa;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 24px 32px;
            color: white;
            border-radius: 12px 12px 0 0;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
        }

        .tab-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 24px;
        }

        .tab {
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            color: #6b7280;
            font-weight: 500;
        }

        .tab.active {
            background: #667eea;
            color: white;
            font-weight: 600;
        }

        .content-area {
            padding: 24px;
            min-height: 400px;
        }

        .card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .card h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #1f2937;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-secondary {
            background: #e5e7eb;
            color: #374151;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            display: none;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 32px;
            border-radius: 12px;
            max-width: 480px;
            width: 90%;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-header h3 {
            font-size: 20px;
            font-weight: 600;
            margin: 0;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #6b7280;
        }

        .btn-group {
            display: flex;
            gap: 12px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>功能导航</h2>
            <div class="nav-item active">列表页</div>
            <div class="nav-item">详情页</div>
            <div class="nav-item">设置页</div>
        </div>

        <div class="main">
            <div class="header">
                <h1>{{FEATURE_NAME}}</h1>
            </div>

            <div class="tab-bar">
                <div class="tab active">选项卡</div>
                <div class="tab">列表</div>
                <div class="tab">设置</div>
            </div>

            <div class="content-area" id="content-list">
                <div class="card">
                    <h3>功能示例 1</h3>
                    <div class="form-group">
                        <label>名称</label>
                        <input type="text" class="form-input" value="示例功能">
                    </div>
                    <div class="form-group">
                        <label>状态</label>
                        <select class="form-input">
                            <option>启用</option>
                            <option>禁用</option>
                        </select>
                    </div>
                    <button class="btn btn-secondary" onclick="showModal('详情')">查看详情</button>
                </div>

                <div class="card">
                    <h3>功能示例 2</h3>
                    <div class="form-group">
                        <label>名称</label>
                        <input type="text" class="form-input" value="另一个功能">
                    </div>
                    <div class="form-group">
                        <label>状态</label>
                        <select class="form-input">
                            <option>启用</option>
                            <option>禁用</option>
                        </select>
                    </div>
                    <button class="btn btn-secondary" onclick="showModal('详情')">查看详情</button>
                </div>

                <button class="btn btn-primary" style="width: 100%; margin-top: 24px;">+ 添加功能</button>
            </div>

            <div class="content-area hidden" id="content-settings">
                <div class="card">
                    <h3>全局设置</h3>
                    <div class="form-group">
                        <label>主题</label>
                        <select class="form-input">
                            <option>浅色</option>
                            <option>深色</option>
                        </select>
                    </div>
                </div>
                <button class="btn btn-primary" style="width: 100%;">保存设置</button>
            </div>
        </div>
    </div>

    <!-- 弹窗 -->
    <div class="modal" id="detail-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">功能详情</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="closeModal()">确定</button>
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
            </div>
        </div>
    </div>

    <script>
        function showModal(title) {
            document.getElementById('modal-title').textContent = title + ' - 详情';
            document.getElementById('detail-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('detail-modal').classList.remove('active');
        }

        // Tab 切换
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');

                const contentId = this.textContent === '选项卡' ? 'content-list' : 'content-settings';
                document.querySelectorAll('.content-area').forEach(c => c.classList.add('hidden'));
                document.getElementById(contentId).classList.remove('hidden');
            });
        });

        // 侧边栏导航
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
