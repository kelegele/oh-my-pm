# Oh-My-PM Subagents Manifest
# 用于 Claude Code 自动发现和加载 Subagents

manifest:
  version: "0.3.0"
  plugin: "oh-my-pm"
  description: "产品经理 AI Agent 工作流系统 - Subagents"

subagents:
  # ========== 需求感知层 ==========
  perception:
    - name: market-researcher
      file: .claude/agents/perception/market-researcher.md
      triggers:
        - 分析 X 市场
        - 市场规模
        - 行业趋势
        - market research
        - 市场研究

    - name: competitive-analyst
      file: .claude/agents/perception/competitive-analyst.md
      triggers:
        - 竞品分析
        - 对比 XX 和 YY
        - competitive analysis
        - 竞品对比

    - name: user-interviewer
      file: .claude/agents/perception/user-interviewer.md
      triggers:
        - 用户访谈
        - 用户画像
        - user research
        - 用户研究

    - name: data-monitor
      file: .claude/agents/perception/data-monitor.md
      triggers:
        - 监控指标
        - 数据看板
        - monitor metrics
        - 指标分析

  # ========== 方案设计层 ==========
  design:
    - name: process-optimizer
      file: .claude/agents/design/process-optimizer.md
      triggers:
        - 流程优化
        - 提效方案
        - optimize process
        - 效率改进

  # ========== 价值验证层 ==========
  validation:
    - name: impact-analyst
      file: .claude/agents/validation/impact-analyst.md
      triggers:
        - 上线效果
        - 效果分析
        - impact analysis
        - 如何表现

    - name: feedback-collector
      file: .claude/agents/validation/feedback-collector.md
      triggers:
        - 用户反馈
        - 反馈分析
        - feedback synthesis
        - 用户说什么

  # ========== 工作流编排器 ==========
  workflows:
    - name: pm-orchestrator
      file: .claude/agents/workflows/pm-orchestrator.md
      triggers:
        - 完整产品规划
        - 0-1 产品
        - full PM cycle
        - 产品全周期
      type: orchestrator
